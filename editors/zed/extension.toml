id = "crowdcontrol"
name = "CrowdControl"
version = "0.1.0"
schema_version = 1
description = "Support for the CrowdControl policy language: parser, diagnostics, hover, completion, and syntax highlighting."
repository = "https://github.com/mikemackintosh/crowdcontrol"
authors = ["Mike Mackintosh"]

languages = ["languages/crowdcontrol"]

[lib]
kind = "Rust"
version = "0.7.0"

# The grammar lives at the top of this same repo under
# tree-sitter-crowdcontrol/. For a local "Install Dev Extension"
# install, Zed can load it via a file:// URL — run
# ./scripts/install-zed-extension.sh which rewrites this block
# with the absolute file:// path on your machine before installing.
#
# For Phase C (official registry submission), the grammar will be
# split into its own repo at github.com/mikemackintosh/tree-sitter-crowdcontrol
# and this block will reference that repo with a pinned commit SHA.
[grammars.crowdcontrol]
repository = "https://github.com/mikemackintosh/crowdcontrol"
rev = "main"

[language_servers.cc-lsp]
name = "cc-lsp"
language = "CrowdControl"
languages = ["CrowdControl"]

[language_servers.cc-lsp.language_ids]
CrowdControl = "crowdcontrol"
