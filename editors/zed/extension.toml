id = "crowdcontrol"
name = "CrowdControl"
description = "Support for the CrowdControl policy language — diagnostics, hover, completion, and tree-sitter syntax highlighting via the cc-lsp language server."
version = "0.1.0"
schema_version = 1
authors = ["Mike Mackintosh"]
repository = "https://github.com/mikemackintosh/crowdcontrol"

[language_servers.cc-lsp]
name = "cc-lsp"
language = "CrowdControl"

[grammars.crowdcontrol]
# For local dev: scripts/install-zed-extension.sh rewrites this
# block to a file:// URL pointing at the bundled grammar copy.
# For Phase C (registry), this will be replaced with a proper
# git URL to a standalone tree-sitter-crowdcontrol repo and a
# pinned commit SHA.
repository = "https://github.com/mikemackintosh/crowdcontrol"
commit = "0000000000000000000000000000000000000000"
