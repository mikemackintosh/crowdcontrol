name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Build cc CLI
        run: go build -o bin/cc ./cmd/cc

      - name: Build cc-lsp
        run: go build -o bin/cc-lsp ./cmd/cc-lsp

      - name: Smoke test cc CLI
        run: |
          ./bin/cc version
          ./bin/cc parse examples/quickstart.cc
          ./bin/cc validate --policy examples/policies --schema examples/schema.json

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
